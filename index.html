<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyUp — Deway Content Intake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #3D68F5;
    --accent-1: #7B6BE6;
    --accent-2: #2DD4A8;
    --dark: #0F1923;
    --card: #161F2C;
    --border: rgba(255,255,255,0.08);
    --gray: #8896A6;
    --white: #F1F5F9;
    --radius: 14px;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    padding: 32px 24px 0;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 20px;
  }
  .logo-ru {
    width: 48px; height: 48px;
    background: linear-gradient(180deg, var(--primary), var(--accent-1));
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .logo-ru svg { width: 26px; height: 26px; }
  .logo-x {
    font-size: 16px; color: rgba(255,255,255,0.25); font-weight: 500;
  }
  .logo-brand {
    width: 48px; height: 48px;
    background: white;
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px;
    color: #1a1a2e;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.5px;
  }
  .logo-chip {
    background: white; border-radius: var(--radius);
    padding: 8px 12px; display: inline-flex; align-items: center;
  }
  .logo-chip svg { height: 28px; width: auto; display: block; }
  .done .logo-chip { margin-bottom: 20px; padding: 12px 16px; }
  .done .logo-chip svg { height: 34px; }
  .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .header p { color: var(--gray); font-size: 15px; max-width: 480px; margin: 0 auto 8px; }
  .time-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(45,212,168,0.1); border: 1px solid rgba(45,212,168,0.25);
    color: #2DD4A8; font-size: 13px; font-weight: 600;
    padding: 6px 16px; border-radius: 50px; margin-top: 12px;
  }

  .progress-wrap { max-width: 640px; margin: 28px auto 0; padding: 0 24px; }
  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent-1));
    border-radius: 4px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--gray); font-weight: 500;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 24px 24px 120px; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--primary); margin-bottom: 8px;
  }
  .block-label {
    display: inline-block;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--accent-2);
    background: rgba(45,212,168,0.08);
    border: 1px solid rgba(45,212,168,0.2);
    padding: 4px 10px; border-radius: 50px;
    margin-bottom: 14px;
  }
  .section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .section-desc { font-size: 14px; color: var(--gray); margin-bottom: 28px; }

  .question { margin-bottom: 28px; }
  .q-label {
    font-size: 15px; font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .q-hint { font-size: 13px; color: var(--gray); margin-bottom: 10px; font-style: italic; }

  textarea, input[type="text"], input[type="email"] {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; color: var(--white);
    font-family: inherit; font-size: 15px; resize: vertical;
    transition: border-color 0.2s; outline: none;
  }
  textarea:focus, input[type="text"]:focus, input[type="email"]:focus {
    border-color: rgba(74,156,245,0.5);
  }
  textarea { min-height: 88px; }
  textarea.tall { min-height: 160px; }

  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .radio-row:hover { border-color: rgba(74,156,245,0.4); background: rgba(74,156,245,0.06); }
  .radio-row.selected {
    background: rgba(74,156,245,0.10); border-color: var(--primary);
  }
  .radio-row input[type="radio"] {
    margin-top: 4px; accent-color: var(--primary);
  }
  .radio-row .rl { font-size: 14px; font-weight: 500; }

  .inline-text { margin-top: 10px; display: none; }
  .inline-text.show { display: block; }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,25,35,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 640px; margin: 0 auto;
    z-index: 100;
  }
  @media(min-width:641px) {
    .nav-bar { left: 50%; transform: translateX(-50%); border-radius: 20px 20px 0 0; }
  }
  .btn {
    padding: 12px 28px; border-radius: 12px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-ghost { background: transparent; color: var(--gray); }
  .btn-ghost:hover { color: var(--white); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--accent-1));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit {
    background: linear-gradient(135deg, #2DD4A8, #1DB88E);
    color: white;
  }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .welcome { text-align: center; padding: 40px 0 0; }
  .welcome h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
  .welcome p { color: var(--gray); font-size: 16px; max-width: 460px; margin: 0 auto 32px; line-height: 1.65; }
  .welcome-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    text-align: left; margin-bottom: 32px;
  }
  .wc {
    padding: 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .wc h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .wc p { font-size: 12px; color: var(--gray); margin: 0; }

  .done { text-align: center; padding: 60px 0; }
  .done .logo-brand {
    width: 64px; height: 64px; margin-bottom: 20px;
    border-radius: var(--radius); font-size: 20px;
  }
  .done h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .done p { color: var(--gray); font-size: 16px; max-width: 420px; margin: 0 auto; line-height: 1.6; }

  .gate { max-width: 420px; margin: 80px auto; padding: 0 24px; text-align: center; }
  .gate h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .gate p { color: var(--gray); font-size: 14px; }

  @media(max-width:480px) {
    .welcome-cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
    .section-title { font-size: 20px; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
  // ============================================================
  // Build the app shell (no token gate — open access)
  // ============================================================
  var DEWAY_LOGO = '<svg viewBox="0 0 507 155" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="66" cy="74" r="44" fill="black"/><circle cx="66.5" cy="74.5" r="33.5" fill="white"/><rect x="57" y="33" width="19" height="47" rx="9.5" fill="black"/><path d="M138.92 93.256H143.72V50.152H138.92V34.312H177.896C188.584 34.312 197.064 37.256 203.336 43.144C209.672 48.968 212.84 58.472 212.84 71.656C212.84 84.84 209.672 94.376 203.336 100.264C197.064 106.088 188.584 109 177.896 109H138.92V93.256ZM176.168 93.256C178.344 93.256 179.976 92.68 181.064 91.528C182.152 90.376 182.696 88.584 182.696 86.152V57.16C182.696 52.424 180.52 50.056 176.168 50.056H170.6V93.256H176.168ZM244.492 110.344C235.404 110.344 228.3 107.976 223.18 103.24C218.06 98.44 215.5 91.464 215.5 82.312C215.5 73.16 218.06 66.216 223.18 61.48C228.3 56.68 235.404 54.28 244.492 54.28C253.516 54.28 260.012 56.648 263.98 61.384C268.012 66.056 270.028 71.88 270.028 78.856V85.768H238.924V86.344C238.924 88.712 239.628 90.472 241.036 91.624C242.444 92.712 244.78 93.256 248.044 93.256C251.948 93.256 255.66 92.968 259.18 92.392C262.7 91.816 265.772 91.08 268.396 90.184V105.544C266.156 106.76 262.86 107.88 258.508 108.904C254.22 109.864 249.548 110.344 244.492 110.344ZM250.06 75.208V74.056C250.06 71.88 249.58 70.312 248.62 69.352C247.724 68.392 246.348 67.912 244.492 67.912C242.636 67.912 241.228 68.424 240.268 69.448C239.372 70.408 238.924 71.944 238.924 74.056V75.208H250.06ZM288.82 109L276.148 71.368H272.116V55.624H301.78V71.368H297.748L301.204 86.344H302.164L309.172 55.624H326.836L333.844 86.344H334.804L338.164 71.368H334.132V55.624H361.972V71.368H357.94L345.748 109H322.42L317.14 82.312H316.18L310.9 109H288.82ZM419.696 93.256V109H394.352V102.472C392.944 104.52 390.96 106.344 388.4 107.944C385.904 109.544 382.832 110.344 379.184 110.344C374.384 110.344 370.608 109.064 367.856 106.504C365.104 103.944 363.728 100.328 363.728 95.656C363.728 83.56 374 77.352 394.544 77.032C394.352 74.856 393.52 73.384 392.048 72.616C390.576 71.784 388.08 71.368 384.56 71.368C381.68 71.368 378.576 71.688 375.248 72.328C371.984 72.904 368.976 73.704 366.224 74.728V57.064C369.616 56.232 373.296 55.56 377.264 55.048C381.232 54.536 385.104 54.28 388.88 54.28C398.416 54.28 405.232 56.008 409.328 59.464C413.424 62.92 415.472 68.264 415.472 75.496V93.256H419.696ZM394.352 86.536C391.472 86.536 389.232 86.92 387.632 87.688C386.096 88.456 385.328 89.736 385.328 91.528C385.328 92.616 385.648 93.512 386.288 94.216C386.992 94.856 387.952 95.176 389.168 95.176C390.832 95.176 392.112 94.472 393.008 93.064C393.904 91.656 394.352 89.672 394.352 87.112V86.536ZM480.583 55.624V71.368H476.935L464.359 104.68C461.223 113.064 457.639 119.336 453.607 123.496C449.575 127.72 444.263 129.832 437.671 129.832C434.983 129.832 432.263 129.544 429.511 128.968C426.759 128.456 424.263 127.72 422.023 126.76V109.384H435.271V110.344C435.271 111.944 436.103 112.744 437.767 112.744C439.239 112.744 440.359 112.04 441.127 110.632L425.959 71.368H422.311V55.624H450.823V71.368H447.559L452.551 86.344L457.159 71.368H453.895V55.624H480.583Z" fill="black"/></svg>';

  document.getElementById('root').innerHTML = ''
    + '<div class="header">'
    + '  <div class="logo-row">'
    + '    <div class="logo-ru"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg></div>'
    + '    <span class="logo-x">x</span>'
    + '    <div class="logo-chip">' + DEWAY_LOGO + '</div>'
    + '  </div>'
    + '  <h1>Executive Content Intake</h1>'
    + '  <p>Voice, audience, and the stories posts can\'t reach.</p>'
    + '  <div class="time-badge">Takes about 12 minutes</div>'
    + '</div>'
    + '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>'
    + '  <div class="progress-label"><span id="sectionLabel">Welcome</span><span id="progressPct">0%</span></div>'
    + '</div>'
    + '<div class="container" id="app"></div>'
    + '<div class="nav-bar">'
    + '  <button class="btn btn-ghost" id="btnBack" onclick="goBack()">Back</button>'
    + '  <button class="btn btn-primary" id="btnNext" onclick="goNext()">Get Started</button>'
    + '</div>';

  // ============================================================
  // Session + Apps Script wiring
  // ============================================================
  var SESSION_ID = (Date.now().toString(36) + Math.random().toString(36).substr(2, 9));
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfpZt2js_Ik8schWyrcQ97TNTxgxoun3ZXCzG4VrMTEB9tZMlr38D64zHAUNjiQebX0w/exec';
  var state = {};

  function sendEvent(event, fields) {
    Object.assign(state, fields || {});
    state.event = event;
    state.session_id = SESSION_ID;
    state.timestamp = new Date().toISOString();
    try {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(state),
        redirect: 'follow'
      });
    } catch (e) { /* network noise — swallow */ }
  }

  // ============================================================
  // Sections — 10 questions across 3 blocks
  //   Block A · Voice & Audience      → Q1, Q2, Q3
  //   Block B · Your Story (2 posts)  → Q4 (see), Q5 (don't see), Q6 (timeline)
  //   Block C · Voice, Expertise & Boundaries → Q7–Q10
  // ============================================================
  var sections = [
    // 0: Welcome
    { id: 'welcome', label: 'Welcome', type: 'welcome', render: function () {
      return ''
        + '<div class="welcome">'
        + '  <h2>Hey Alon</h2>'
        + '  <p>You already have the audience and the reputation. This fills in what we can\'t see from your profile: who you want reading now, and the personal stories we\'ll turn into your first standout posts. Answer fast, first instinct, no editing.</p>'
        + '  <div class="welcome-cards">'
        + '    <div class="wc"><h4>10 short questions</h4><p>3 blocks: voice, your story, depth</p></div>'
        + '    <div class="wc"><h4>About 12 minutes</h4><p>Coffee-length</p></div>'
        + '    <div class="wc"><h4>No wrong answers</h4><p>First instinct wins</p></div>'
        + '    <div class="wc"><h4>Stays between us</h4><p>Only your content team sees it</p></div>'
        + '  </div>'
        + '</div>';
    }},

    // ─── BLOCK A · Voice & Audience ───────────────────────────────

    // 1: Q1 — Who do you want to reach? (open)
    { id: 'q1', label: 'Voice & Audience', type: 'question', qNum: 1, qKey: 'q1', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 1 of 10</div>'
        + '<div class="section-title">Who do you want to reach on LinkedIn?</div>'
        + '<div class="section-desc">Not everyone — your inner circle. The people whose attention would move Deway this year. You said the focus right now is new customers and fundraising, so think about who sits behind both.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Describe them in your own words.</div>'
        + '  <div class="q-hint">Be specific. From your world: VPs of CS / Heads of Product / RevOps leaders at mid-market and growth SaaS who keep getting blindsided by churn that looked "green." Plus the investors you\'d want tracking Deway.</div>'
        + '  <textarea class="tall" data-key="q1" placeholder="e.g., VPs of Customer Success and Heads of Product at growth-stage B2B SaaS who trust their dashboards but keep getting surprised by churn, plus a few early-stage investors I\'d want watching what we\'re building..."></textarea>'
        + '</div>';
    }},

    // 2: Q2 — How do you want them to see YOU? (radio + Other)
    { id: 'q2', label: 'Voice & Audience', type: 'question', qNum: 2, qKey: 'q2', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 2 of 10</div>'
        + '<div class="section-title">How do you want them to see <em>you</em>?</div>'
        + '<div class="section-desc">When someone describes you to a peer, what line do you want them to use? Pick the closest or write your own.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Choose the closest framing.</div>'
        + '  <div class="radio-group" data-key="q2">'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The pragmatic product analyst"><span class="rl"><strong>The pragmatic product analyst</strong> → the operator who rotates conventional CS/product wisdom until the failure mode shows ("adoption isn\'t usage, it\'s outcomes")</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The CS and data operator who has lived the churn"><span class="rl"><strong>The CS &amp; data operator who\'s lived it</strong> → sat in too many green-health-score postmortems; speaks from the QBR trenches, not the slide deck</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The founder rethinking adoption"><span class="rl"><strong>The founder rethinking adoption</strong> → building the autonomous layer that catches silent churn the dashboards miss</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The generous teacher"><span class="rl"><strong>The generous teacher</strong> → free workshops, pay-it-forward, DMs open; known for giving the real playbook away</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="Other"><span class="rl"><strong>Other</strong> → write your own framing</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Other">'
        + '    <textarea data-key="q2_other" placeholder="How do you want to be seen, in your own words?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 3: Q3 — How do you want them to see Deway? (open)
    { id: 'q3', label: 'Voice & Audience', type: 'question', qNum: 3, qKey: 'q3', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 3 of 10</div>'
        + '<div class="section-title">How do you want them to see <em>Deway</em>?</div>'
        + '<div class="section-desc">When that same peer asks "what is Deway?", what should the answer be? Your site says "the autonomous adoption layer for B2B SaaS, one line of code, live in 72 hours." Confirm that, sharpen it, or say it the way you actually pitch it.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Describe Deway the way you\'d want a customer to repeat it.</div>'
        + '  <div class="q-hint">What it does, who it\'s for, and the one thing that separates it from the DAPs (Pendo, WalkMe, Appcues). Plain language beats a tagline.</div>'
        + '  <textarea class="tall" data-key="q3" placeholder="Deway is the autonomous adoption layer for B2B SaaS — it ... for ... and unlike Pendo/WalkMe it ..."></textarea>'
        + '</div>';
    }},

    // ─── BLOCK B · Your Story (Two Signature Posts) ───────────────

    // 4: Q4 — "What people SEE" (open, list)
    { id: 'q4', label: 'Your Story', type: 'question', qNum: 4, qKey: 'q4', render: function () {
      return ''
        + '<div class="block-label">Block B · Your Story</div>'
        + '<div class="section-label">Question 4 of 10</div>'
        + '<div class="section-title">What do people <em>see</em> when they look at your journey?</div>'
        + '<div class="section-desc">First half of a post we love running for founders: the highlight reel. The wins, titles, and milestones the outside world knows you for.</div>'
        + '<div class="question">'
        + '  <div class="q-label">List 3–5 things people see (the public version).</div>'
        + '  <div class="q-hint">One per line. e.g., "#1 voice in product analytics in Israel," "featured in Lenny\'s newsletter," "left a senior role to start Deway," "big engaged LinkedIn audience." Just the visible facts for now.</div>'
        + '  <textarea class="tall" data-key="q4" placeholder="1. \n2. \n3. \n4. "></textarea>'
        + '</div>';
    }},

    // 5: Q5 — "What people DON'T see" (open, tall)
    { id: 'q5', label: 'Your Story', type: 'question', qNum: 5, qKey: 'q5', render: function () {
      return ''
        + '<div class="block-label">Block B · Your Story</div>'
        + '<div class="section-label">Question 5 of 10</div>'
        + '<div class="section-title">What do people <em>not</em> see?</div>'
        + '<div class="section-desc">The other half, and the part that makes the post land. The cost behind each win: the doubt, the sacrifices, the things that went wrong, the unglamorous grind nobody posts about.</div>'
        + '<div class="question">'
        + '  <div class="q-label">List 3–5 things people don\'t see — be honest, even uncomfortable.</div>'
        + '  <div class="q-hint">One per line. e.g., "going from the expert in the room to feeling like a junior again," "the fundraising no\'s," "months where I wasn\'t sure what to even post," "what I gave up to start this." Specifics beat platitudes.</div>'
        + '  <textarea class="tall" data-key="q5" placeholder="1. \n2. \n3. \n4. "></textarea>'
        + '</div>';
    }},

    // 6: Q6 — Timeline post (open, tall)
    { id: 'q6', label: 'Your Story', type: 'question', qNum: 6, qKey: 'q6', render: function () {
      return ''
        + '<div class="block-label">Block B · Your Story</div>'
        + '<div class="section-label">Question 6 of 10</div>'
        + '<div class="section-title">Map your journey by year.</div>'
        + '<div class="section-desc">Second signature post: a timeline. The turning points that got you here, year by year. We\'ll shape it into the narrative; you just give us the raw markers.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Give us 5–8 turning-point years and what happened at each.</div>'
        + '  <div class="q-hint">Format: <strong>YEAR — what happened (and why it mattered)</strong>, one per line. Include the unglamorous or surprising turns, not just the wins. e.g., "2014 — first PM role, realized no one actually trusted the data." Real years, please.</div>'
        + '  <textarea class="tall" data-key="q6" placeholder="20XX — \n20XX — \n20XX — \n20XX — \n20XX — "></textarea>'
        + '</div>';
    }},

    // ─── BLOCK C · Voice, Expertise & Boundaries ──────────────────

    // 7: Q7 — Most significant career moment (open, tall)
    { id: 'q7', label: 'Depth', type: 'question', qNum: 7, qKey: 'q7', render: function () {
      return ''
        + '<div class="block-label">Block C · Voice, Expertise &amp; Boundaries</div>'
        + '<div class="section-label">Question 7 of 10</div>'
        + '<div class="section-title">The one moment that made you who you are professionally.</div>'
        + '<div class="section-desc">This is the one we\'ll mine for years. Go emotional and specific over polished. Tell it like you\'d tell a close friend, not a journalist, the room, the conversation, what it actually cost.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Tell the story.</div>'
        + '  <div class="q-hint">Prompts if you\'re stuck: what you were doing right before, who else was there, what you almost did instead, what it cost you. The moment you became "the product analytics guy," a project that failed and changed you, the decision to start Deway.</div>'
        + '  <textarea class="tall" data-key="q7" placeholder="Start anywhere. Don\'t edit while writing. First pass. Get it out."></textarea>'
        + '</div>';
    }},

    // 8: Q8 — Sharpest contrarian take (open)
    { id: 'q8', label: 'Depth', type: 'question', qNum: 8, qKey: 'q8', render: function () {
      return ''
        + '<div class="block-label">Block C · Voice, Expertise &amp; Boundaries</div>'
        + '<div class="section-label">Question 8 of 10</div>'
        + '<div class="section-title">What does almost everyone in product / CS / CX get wrong?</div>'
        + '<div class="section-desc">You have years of strong opinions here. Give us the one you\'d defend in a room full of people who disagree, the take that makes a good contrarian post.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Your sharpest contrarian take, and why you\'re right.</div>'
        + '  <div class="q-hint">The more specific and the more it costs you to say out loud, the better. Bonus if you can point to what the data or your own experience proves.</div>'
        + '  <textarea data-key="q8" placeholder="Everyone believes X. They\'re wrong, because..."></textarea>'
        + '</div>';
    }},

    // 9: Q9 — A specific story (win, save, or failure) (open)
    { id: 'q9', label: 'Depth', type: 'question', qNum: 9, qKey: 'q9', render: function () {
      return ''
        + '<div class="block-label">Block C · Voice, Expertise &amp; Boundaries</div>'
        + '<div class="section-label">Question 9 of 10</div>'
        + '<div class="section-title">One specific story — a win, a save, or a failure.</div>'
        + '<div class="section-desc">A concrete moment from your work: a team or product you turned around, a call that went sideways, a number that changed everything. Specifics give us proof posts that don\'t sound like everyone else\'s.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Tell one, with the real details.</div>'
        + '  <div class="q-hint">Names (where shareable), numbers, the before and after, what you actually did. The messier and more real, the better.</div>'
        + '  <textarea data-key="q9" placeholder="There was this one time..."></textarea>'
        + '</div>';
    }},

    // 10: Q10 — Guardrails + voice (open)
    { id: 'q10', label: 'Depth', type: 'question', qNum: 10, qKey: 'q10', render: function () {
      return ''
        + '<div class="block-label">Block C · Voice, Expertise &amp; Boundaries</div>'
        + '<div class="section-label">Question 10 of 10</div>'
        + '<div class="section-title">Anything off-limits — and how you never want to sound.</div>'
        + '<div class="section-desc">So we never put words in your mouth you\'d regret. Topics to avoid, things you won\'t say publicly, and the tone you\'d hate to read back.</div>'
        + '<div class="question">'
        + '  <div class="q-label">What\'s off the table, and what should we never sound like?</div>'
        + '  <div class="q-hint">e.g., "don\'t touch politics," "don\'t name former employers negatively," "never salesy or hype-y," "no fake vulnerability." Anything goes here.</div>'
        + '  <textarea data-key="q10" placeholder="Avoid: ... \nNever sound: ..."></textarea>'
        + '</div>';
    }},

    // Submit
    { id: 'submit', label: 'Submit', type: 'submit', render: function () {
      return ''
        + '<div class="section-label">Final step</div>'
        + '<div class="section-title">Thanks for the time, Alon.</div>'
        + '<div class="section-desc">That\'s everything we needed to get started. Hit submit and your content team will take it from here. Excited to kick this off.</div>';
    }},

    // Done
    { id: 'done', label: 'Done', type: 'done', render: function () {
      return ''
        + '<div class="done">'
        + '  <div class="logo-chip">' + DEWAY_LOGO + '</div>'
        + '  <h2>All set.</h2>'
        + '  <p>Your answers landed. Your content team will follow up with first drafts soon.</p>'
        + '</div>';
    }}
  ];

  // ============================================================
  // Renderer
  // ============================================================
  var current = 0;
  var answers = {};
  var startedSent = false;

  function render() {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="section active">' + sections[current].render() + '</div>';

    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (answers[k] === undefined) return;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        el.value = answers[k];
      } else if (el.classList.contains('radio-group')) {
        var radios = el.querySelectorAll('input[type="radio"]');
        radios.forEach(function (r) {
          if (r.value === answers[k]) {
            r.checked = true;
            r.closest('.radio-row').classList.add('selected');
          }
        });
      }
    });

    app.querySelectorAll('.radio-group').forEach(function (group) {
      var radios = group.querySelectorAll('input[type="radio"]');
      var reveals = group.parentElement.querySelectorAll('[data-reveal-for]');
      radios.forEach(function (r) {
        r.addEventListener('change', function () {
          group.querySelectorAll('.radio-row').forEach(function (row) { row.classList.remove('selected'); });
          r.closest('.radio-row').classList.add('selected');
          reveals.forEach(function (revealHost) {
            var trigger = revealHost.dataset.revealFor;
            if (r.value === trigger) revealHost.classList.add('show');
            else revealHost.classList.remove('show');
          });
          saveAll();
        });
      });
      var checked = group.querySelector('input[type="radio"]:checked');
      if (checked) {
        reveals.forEach(function (revealHost) {
          if (checked.value === revealHost.dataset.revealFor) revealHost.classList.add('show');
        });
      }
    });

    app.querySelectorAll('textarea, input[type="text"], input[type="email"]').forEach(function (el) {
      el.addEventListener('input', saveAll);
    });

    updateUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function saveAll() {
    var app = document.getElementById('app');
    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        answers[k] = el.value;
      } else if (el.classList.contains('radio-group')) {
        var checked = el.querySelector('input[type="radio"]:checked');
        answers[k] = checked ? checked.value : '';
      }
    });
  }

  function updateUI() {
    var totalSteps = sections.length - 2;
    var pct;
    if (current === 0) pct = 0;
    else if (current >= sections.length - 1) pct = 100;
    else pct = Math.round((current / totalSteps) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('sectionLabel').textContent = sections[current].label;

    var back = document.getElementById('btnBack');
    var next = document.getElementById('btnNext');
    var navBar = document.querySelector('.nav-bar');

    next.style.display = '';
    back.style.display = '';
    navBar.style.display = '';

    back.style.visibility = current === 0 ? 'hidden' : 'visible';

    var s = sections[current];
    if (s.type === 'welcome') {
      next.textContent = 'Get Started';
      next.className = 'btn btn-primary';
    } else if (s.type === 'submit') {
      next.textContent = 'Submit';
      next.className = 'btn btn-submit';
    } else if (s.type === 'done') {
      navBar.style.display = 'none';
    } else {
      next.textContent = 'Continue';
      next.className = 'btn btn-primary';
    }
  }

  function goNext() {
    saveAll();
    var s = sections[current];

    if (s.type === 'welcome') {
      if (!startedSent) {
        sendEvent('Started', {});
        startedSent = true;
      }
    } else if (s.type === 'question') {
      var payload = {};
      payload[s.qKey] = answers[s.qKey] || '';
      var otherKey = s.qKey + '_other';
      if (answers[otherKey]) payload[otherKey] = answers[otherKey];
      sendEvent('Q' + s.qNum + ' answered', payload);
    } else if (s.type === 'submit') {
      sendEvent('Submitted', {});
    }

    if (current < sections.length - 1) {
      current++;
      render();
    }
  }

  function goBack() {
    saveAll();
    if (current > 0) { current--; render(); }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.metaKey) goNext();
  });

  render();
</script>
</body>
</html>
